# -------- BASIC VARIABLES --------
ipvar HOME_NET 192.168.56.103
ipvar EXTERNAL_NET any
portvar COMMON_PORTS [1,5,7,20,21,22,23,25,37,42,43,49,53,67,68,69,70,79,80,88,102,107,109,110,111,113,119,123,135,137,138,139,143,161,162,177,179,194,389,427,443,445,464,465,497,500,512,513,514,515,520,521,540,548,554,587,631,636,873,902,989,990,993,995,1025,1026,1080,1194,1433,1434,1521,1723,1812,1813,1900,2049,2082,2083,2181,2375,2376,2483,2484,3128,3306,3389,3690,4369,5000,5060,5061,5432,5672,5900,5984,6379,6443,6667,7001,8000,8080,8081,8443,8888,9200,9300,9418,11211,27017]
portvar HTTP_PORTS [80,443]

# -------- PATHS (IMPORTANT) --------
var RULE_PATH C:\Snort\rules

# -------- DECODER SETTINGS --------
config checksum_mode: all

# --- CORE IDS PREPROCESSORS ---
preprocessor frag3_global: max_frags 65536
preprocessor frag3_engine: policy windows detect_anomalies

preprocessor stream5_global: track_tcp yes, track_udp yes
preprocessor stream5_tcp: policy windows, ports client 21 22 23 25 80 443

preprocessor http_inspect: global iis_unicode_map unicode.map 1252
preprocessor http_inspect_server: server default profile all ports { 80 8080 443 }

# -------- OUTPUT --------
# output alert_fast: stdout
output alert_fast
output log_tcpdump: snort.log

# -------- RULES --------
include $RULE_PATH/local.rules